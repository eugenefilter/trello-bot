name: Deploy

on:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint (PHP 8.4)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-vendor-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-vendor-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run Pint in test mode
        run: ./vendor/bin/pint --test

  test:
    name: Test (PHP 8.4, Node 20)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache vendor
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php-8.4-vendor-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.4-vendor-

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend assets
        run: npm run build

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations
        run: |
          touch database/database.sqlite
          php artisan migrate --force

      - name: Run tests
        run: composer test

  ci:
    name: CI Gate
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
    steps:
      - name: CI passed
        run: echo "Lint and tests passed"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: ci
    env:
      SSH_HOST: ${{ secrets.SSH_HOST }}
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PATH: ${{ secrets.SSH_PATH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for asset build
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Build frontend assets
        run: npm run build

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Sync files to server
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='.env' \
            --exclude='storage/logs' \
            ./ "$SSH_USER@$SSH_HOST:$SSH_PATH/"

      - name: Deploy on server
        run: |
          ssh "$SSH_USER@$SSH_HOST" "cd '$SSH_PATH' && \
            /opt/php84/bin/php /usr/local/bin/composer install --no-dev --optimize-autoloader --no-interaction && \
            /opt/php84/bin/php artisan migrate --force && \
            /opt/php84/bin/php artisan config:cache && \
            /opt/php84/bin/php artisan route:cache && \
            /opt/php84/bin/php artisan view:cache && \
            /opt/php84/bin/php artisan horizon:terminate && \
            /opt/php84/bin/php artisan queue:restart"
